<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stephanie | Mis XV Años</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Cinzel',serif;
background:#081321;
color:white;
overflow-x:hidden;
}

/* Fondo */
body::before{
content:'';
position:fixed;
inset:0;
background:radial-gradient(circle at top,#3e74c7 0%,#081321 55%);
z-index:-2;
}

/* Estrellas */
.stars{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
text-align:center;
}

h1{
font-family:'Great Vibes',cursive;
font-size:110px;
color:#dff4ff;
text-shadow:0 0 30px #7db7ff;
}

h2{
font-family:'Great Vibes',cursive;
font-size:70px;
margin-bottom:20px;
color:#dff4ff;
}

p{
max-width:900px;
line-height:1.9;
font-size:20px;
}

.btn{
margin-top:35px;
padding:16px 40px;
border:none;
border-radius:40px;
cursor:pointer;
background:linear-gradient(45deg,#5ba8ff,#9bd8ff);
color:white;
font-size:18px;
text-decoration:none;
transition:.3s;
display: inline-block;
}

.btn:hover{
transform:scale(1.05);
}

/* Reloj */
.clock{
font-size:120px;
margin-bottom:25px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{ transform:scale(1.05); }
}

/* Zapato de Cristal */
.glass-slipper {
cursor: pointer;
transition: .5s;
max-width: 280px;
margin: 0 auto 20px auto;
}

.glass-slipper img {
width: 100%;
height: auto;
filter: drop-shadow(0 0 20px rgba(125, 183, 255, 0.7));
}

.glass-slipper:hover{
transform:scale(1.05) rotate(-5deg);
}

/* Castillo y Corona */
.castle{
max-width: 320px;
margin-bottom:20px;
animation:float Castle 4s ease-in-out infinite;
}

.castle img, .crown img, .carriage img {
width: 100%;
height: auto;
}

.crown {
max-width: 120px;
margin-bottom: 10px;
filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
}

@keyframes floatCastle{
50%{ transform:translateY(-12px); }
}

/* Carruaje Mágico */
.carriage {
max-width: 380px;
margin: 20px auto;
animation: floatCarriage 5s ease-in-out infinite;
filter: drop-shadow(0 0 15px rgba(159, 216, 255, 0.5));
}

@keyframes floatCarriage {
0%, 100% { transform: translateY(0) translateX(0); }
50% { transform: translateY(-8px) translateX(4px); }
}

/* Cuenta Regresiva */
.countdown{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.box{
width:160px;
